<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essence Arenal — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a2e1a;
    --moss: #3d5c2e;
    --sage: #7a9e6b;
    --mist: #b8cfa8;
    --cream: #f5f0e8;
    --parchment: #ede5d4;
    --warm-white: #faf8f4;
    --clay: #c4956a;
    --terra: #8b5e3c;
    --charcoal: #2c2c2c;
    --mid: #6b7569;
    --light: #a8b5a0;
    --border: #ddd8cc;

    --hotel-color: #4a7c59;
    --finca-color: #8b5e3c;

    --yoga: #7a9e6b;
    --massage: #c4956a;
    --cacao: #8b5e3c;
    --bird: #4a7c8c;
    --night: #3d3d6e;
    --meditation: #9b8ea8;
    --kayak: #4a8c8c;
    --cooking: #b8834a;
    --other: #6b7569;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--warm-white);
    color: var(--charcoal);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOGIN ─────────────────────────────────────────── */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--forest);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    flex-direction: column;
    gap: 0;
  }
  #login-screen.hidden { display: none; }

  .login-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, #2d4a1e 0%, #1a2e1a 60%);
    overflow: hidden;
  }
  .login-bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233d5c2e' fill-opacity='0.15'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.6;
  }

  .login-box {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    gap: 32px;
    animation: fadeUp 0.8s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    text-align: center;
  }
  .login-logo h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    color: var(--mist);
    letter-spacing: 0.08em;
    line-height: 1;
  }
  .login-logo p {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--sage);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .login-form {
    display: flex; flex-direction: column; gap: 14px; align-items: center; width: 240px;
  }
  .login-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--light);
    text-transform: uppercase;
    align-self: flex-start;
  }
  .login-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(184,207,168,0.25);
    border-radius: 4px;
    padding: 12px 16px;
    color: var(--mist);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.3em;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .login-input:focus {
    border-color: rgba(184,207,168,0.6);
    background: rgba(255,255,255,0.1);
  }
  .login-btn {
    width: 100%;
    background: var(--sage);
    color: var(--forest);
    border: none;
    border-radius: 4px;
    padding: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .login-btn:hover { background: var(--mist); }
  .login-btn:active { transform: scale(0.98); }
  .login-error {
    font-size: 12px; color: #e07070; display: none;
    font-family: 'DM Mono', monospace; letter-spacing: 0.05em;
  }
  .login-error.show { display: block; }

  /* ── APP SHELL ─────────────────────────────────────── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }
  #app.hidden { display: none; }

  header {
    background: var(--forest);
    padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .header-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--mist);
    letter-spacing: 0.06em;
    display: flex; align-items: baseline; gap: 10px;
  }
  .header-logo span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--sage);
    text-transform: uppercase;
  }

  .header-actions {
    display: flex; align-items: center; gap: 10px;
  }
  .user-pill {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mist);
    background: rgba(184,207,168,0.12);
    border: 1px solid rgba(184,207,168,0.2);
    border-radius: 999px;
    padding: 5px 9px;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(184,207,168,0.25);
    color: var(--light);
    border-radius: 4px;
    padding: 6px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--sage); color: var(--mist); }

  /* ── WEEK NAV ──────────────────────────────────────── */
  .week-nav {
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 28px;
  }
  .week-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--forest);
    letter-spacing: 0.04em;
  }
  .week-btns { display: flex; gap: 6px; align-items: center; }
  .calendar-legend {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 28px 0;
    color: var(--mid);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .calendar-legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .calendar-legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .nav-btn {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 15px; color: var(--mid);
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--sage); color: var(--forest); }
  .btn-today {
    background: var(--forest);
    border: none;
    border-radius: 4px;
    padding: 0 14px; height: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mist);
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-today:hover { background: var(--moss); }
  .btn-add-activity {
    background: #E8837A;
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-add-activity:hover { background: #d97269; }

  /* ── CALENDAR GRID ─────────────────────────────────── */
  .calendar-wrapper {
    flex: 1;
    padding: 24px 28px;
    overflow-x: auto;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: 80px repeat(7, 1fr);
    min-width: 760px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: white;
    box-shadow: 0 2px 16px rgba(26,46,26,0.06);
  }

  .col-header {
    background: var(--forest);
    color: var(--mist);
    padding: 12px 8px;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .col-header:last-child { border-right: none; }
  .col-header.time-header { background: var(--forest); }
  .col-header .day-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--sage);
    display: block;
  }
  .col-header .day-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: var(--mist);
    display: block;
    line-height: 1.1;
  }
  .col-header .day-restriction {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    padding: 1px 7px;
    border-radius: 999px;
    background: rgba(196,149,106,0.25);
    border: 1px solid rgba(196,149,106,0.45);
    color: var(--clay);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .col-header.today-col .day-num {
    color: var(--clay);
  }

  .time-slot-row {
    display: contents;
  }
  .time-label {
    background: var(--parchment);
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 10px 6px 10px 10px;
    display: flex; align-items: flex-start;
  }
  .time-label span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--mid);
    white-space: nowrap;
  }

  .day-cell {
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 6px;
    min-height: 90px;
    position: relative;
    transition: background 0.15s;
  }
  .day-cell:last-child { border-right: none; }
  .day-cell:hover { background: rgba(122,158,107,0.04); }

  .add-btn {
    position: absolute; bottom: 5px; right: 5px;
    width: 22px; height: 22px;
    background: #E8837A;
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .day-cell:hover .add-btn { opacity: 1; }
  .add-btn:hover { background: #d97269; color: white; }

  /* ── ACTIVITY PILLS ────────────────────────────────── */
  .activity-pill {
    border-radius: 4px;
    padding: 4px 7px;
    margin-bottom: 4px;
    font-size: 11px;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s, box-shadow 0.1s;
    border-left: 3px solid rgba(0,0,0,0.2);
  }
  .activity-pill:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .activity-pill .pill-time {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    opacity: 0.75;
    letter-spacing: 0.05em;
  }
  .activity-pill .pill-location {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: 6px;
    padding: 1px 5px;
    border-radius: 999px;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid transparent;
  }
  .activity-pill .pill-location.location-hotel {
    background: rgba(122,158,107,0.18);
    border-color: rgba(122,158,107,0.35);
    color: var(--forest);
  }
  .activity-pill .pill-location.location-finca {
    background: rgba(195,124,72,0.18);
    border-color: rgba(195,124,72,0.35);
    color: #7c4b24;
  }
  .activity-pill .pill-name {
    font-weight: 500;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .activity-pill .pill-staff {
    font-size: 9px;
    opacity: 0.7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pill-del {
    position: absolute; top: 3px; right: 3px;
    width: 14px; height: 14px;
    background: rgba(0,0,0,0.2);
    border: none; border-radius: 50%;
    color: white; font-size: 9px;
    cursor: pointer; opacity: 0;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: opacity 0.15s;
  }
  .activity-pill:hover .pill-del { opacity: 1; }
  .pill-del:hover { background: rgba(180,40,40,0.6); }

  /* activity colors */
  .color-yoga    { background: #e8f5e2; color: #2d5a1e; }
  .color-massage { background: #fdf0e4; color: #6b3a10; }
  .color-cacao   { background: #f0e8dc; color: #5a3010; }
  .color-bird    { background: #e0f0f5; color: #0d4a5a; }
  .color-night   { background: #e8e8f5; color: #2a2a5a; }
  .color-meditation { background: #f0ecf8; color: #4a3060; }
  .color-kayak   { background: #e0f5f5; color: #0d4a4a; }
  .color-cooking { background: #fdf5e4; color: #6b4010; }
  .color-other         { background: #f0f0ee; color: #3a3a38; }
  .color-beauty        { background: #fce4ef; color: #6b1040; }
  .color-temazcal      { background: #fae6d4; color: #7a3010; }
  .color-soundbath     { background: #eee8f8; color: #4a2870; }
  .color-foresttherapy { background: #e0f0e4; color: #1a4a20; }
  .color-welcome       { background: #f5f0e8; color: #5a4830; }
  .color-detox         { background: #e0f4f0; color: #0d4a3a; }
  .color-therapy       { background: #e8e4f5; color: #2a1a5a; }

  /* ── MODAL ─────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,46,26,0.55);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open {
    opacity: 1; pointer-events: all;
  }
  .modal {
    background: var(--warm-white);
    border-radius: 10px;
    width: 100%; max-width: 460px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.2);
    overflow: hidden;
    transform: translateY(16px);
    transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    background: var(--forest);
    padding: 18px 22px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--mist);
    letter-spacing: 0.04em;
  }
  .modal-close {
    background: none; border: none;
    color: var(--light); font-size: 20px;
    cursor: pointer; line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--mist); }

  .modal-body {
    padding: 22px;
    display: flex; flex-direction: column; gap: 14px;
    max-height: 70vh; overflow-y: auto;
  }

  .form-row { display: flex; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .form-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid);
  }
  .form-input, .form-select {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    color: var(--charcoal);
    background: white;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-input:focus, .form-select:focus {
    border-color: var(--sage);
  }

  /* activity type picker */
  .type-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .type-chip {
    padding: 8px 6px;
    border-radius: 5px;
    border: 2px solid transparent;
    cursor: pointer;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.15s;
    line-height: 1.3;
  }
  .type-chip:hover { transform: translateY(-1px); }
  .type-chip.selected { border-color: var(--forest) !important; box-shadow: 0 0 0 2px rgba(26,46,26,0.2); }

  .assignment-warning {
    border: 1px solid rgba(192,57,43,0.35);
    background: rgba(192,57,43,0.08);
    color: #7f1d1d;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    line-height: 1.35;
    display: none;
  }
  .assignment-warning.show { display: block; }

  .mini-table {
    border: 1px solid var(--border);
    border-radius: 6px;
    max-height: 240px;
    overflow: auto;
    background: #fff;
  }
  .mini-table table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .mini-table th,
  .mini-table td {
    padding: 8px 10px;
    border-bottom: 1px solid #eee;
    text-align: left;
    vertical-align: top;
  }
  .mini-table th {
    position: sticky;
    top: 0;
    background: var(--cream);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mid);
  }
  .tiny-btn {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 7px;
    font-size: 11px;
    cursor: pointer;
  }
  .tiny-btn:hover { border-color: #c0392b; color: #c0392b; }

  .modal-footer {
    padding: 14px 22px;
    display: flex; gap: 8px; justify-content: flex-end;
    border-top: 1px solid var(--border);
    background: var(--cream);
  }
  .btn-cancel {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; color: var(--mid);
    cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--mid); color: var(--charcoal); }
  .btn-save {
    background: var(--forest);
    border: none;
    border-radius: 4px;
    padding: 9px 22px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; color: var(--mist);
    cursor: pointer; font-weight: 500;
    transition: background 0.15s;
  }
  .btn-save:hover { background: var(--moss); }
  .btn-delete-act {
    background: #c0392b;
    border: none;
    border-radius: 4px;
    padding: 9px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; color: white;
    cursor: pointer;
    transition: background 0.15s;
    margin-right: auto;
  }
  .btn-delete-act:hover { background: #a93226; }

  /* ── RESPONSIVE ──────────────────────────────── */
  @media (max-width: 600px) {
    .calendar-wrapper { padding: 12px; }
    .calendar-legend { padding: 10px 14px 0; }
    header { padding: 0 14px; }
    .week-nav { padding: 0 14px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-bg"></div>
  <div class="login-box">
    <div class="login-logo">
      <h1>Essence Arenal</h1>
      <p>Panel de Administración</p>
    </div>
    <div class="login-form">
      <label class="login-label">Email</label>
      <input class="login-input" type="email" id="email-input" placeholder="correo@dominio.com" autocomplete="email" style="font-size:13px;letter-spacing:0.04em;text-align:left;">
      <label class="login-label">Código de acceso</label>
      <input class="login-input" type="password" id="pwd-input" maxlength="6" placeholder="···" autocomplete="off">
      <button class="login-btn" onclick="tryLogin()">Ingresar</button>
      <div class="login-error" id="login-error">Email o código incorrecto</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <div class="header-logo">
      Essence Arenal <span>Admin</span>
    </div>
    <div class="header-actions">
      <span class="user-pill" id="user-pill"></span>
      <button class="btn-ghost" id="btn-availability" onclick="openAvailabilityModal()" style="display:none">Disponibilidad</button>

function timeToMinutes(value) {
  if (!/^\d{2}:\d{2}$/.test(value || '')) return null;
  const [h, m] = value.split(':').map(Number);
  return (h * 60) + m;
}

function getTypeNameById(typeId) {
  return ACTIVITY_TYPES.find(t => t.id === typeId)?.name || typeId;
}

function getEmployeeAvailabilityRule(employeeName, dateStr) {
  const cfg = employeeAvailability[employeeName];
  if (!cfg || !dateStr) return null;

  const dayIndex = new Date(`${dateStr}T00:00:00`).getDay();
  const weeklyRule = cfg.weekly?.[dayIndex] || {};
  const dateRule = cfg.dates?.[dateStr] || {};

  const blocked = [...(weeklyRule.blockedTypes || []), ...(dateRule.blockedTypes || [])];
  const merged = {
    off: Boolean(weeklyRule.off || dateRule.off),
    start: dateRule.start || weeklyRule.start || '',
    end: dateRule.end || weeklyRule.end || '',
    blockedTypes: Array.from(new Set(blocked)),
  };

  if (!merged.off && !merged.start && !merged.end && !merged.blockedTypes.length) return null;
  return merged;
}

function hasAnyRestriction(rule) {
  return Boolean(rule && (rule.off || rule.start || rule.end || (rule.blockedTypes && rule.blockedTypes.length)));
}

function describeRestriction(rule) {
  if (!rule) return '';
  const parts = [];
  if (rule.off) parts.push('día libre');
  if (rule.start) parts.push(`disponible desde ${rule.start}`);
  if (rule.end) parts.push(`disponible hasta ${rule.end}`);
  if (rule.blockedTypes?.length) {
    const names = rule.blockedTypes.map(getTypeNameById).join(', ');
    parts.push(`sin ${names}`);
  }
  return parts.join(' · ');
}

function validateAssignmentAvailability(employeeName, dateStr, timeValue, typeId) {
  if (!employeeName || !dateStr) return { ok: true, reason: '' };
  const rule = getEmployeeAvailabilityRule(employeeName, dateStr);
  if (!hasAnyRestriction(rule)) return { ok: true, reason: '' };

  if (rule.off) {
    return { ok: false, reason: `${employeeName} tiene día libre.` };
  }

  const target = timeToMinutes(timeValue);
  if (target !== null && rule.start) {
    const startMin = timeToMinutes(rule.start);
    if (startMin !== null && target < startMin) {
      return { ok: false, reason: `${employeeName} está disponible solo después de ${rule.start}.` };
    }
  }

  if (target !== null && rule.end) {
    const endMin = timeToMinutes(rule.end);
    if (endMin !== null && target > endMin) {
      return { ok: false, reason: `${employeeName} está disponible solo hasta ${rule.end}.` };
    }
  }

  if (rule.blockedTypes?.includes(typeId)) {
    return { ok: false, reason: `${employeeName} no está disponible para ${getTypeNameById(typeId)} ese día.` };
  }

  return { ok: true, reason: '' };
}

function resolveModalDateStr() {
  if (pendingCell?.dateStr) return pendingCell.dateStr;

  if (editingId !== null) {
    const editing = activities.find(a => a.id === editingId);
    if (editing?.date) return editing.date;
    if (typeof editing?.dow === 'number') {
      const weekStart = getWeekStart(weekOffset);
      const d = new Date(weekStart);
      d.setDate(d.getDate() + editing.dow);
      return d.toISOString().split('T')[0];
    }
  }

  const fallback = getWeekStart(weekOffset);
  return fallback.toISOString().split('T')[0];
}

  warningEl.textContent = '';

function addDayOffRule() {

  employeeAvailability[employee].dates[dateStr] = { ...existing, off: true };

  renderOffList();
}

function removeDayOffRule(employee, dateStr) {
  ensureEmployeeAvailabilityNode(employee);
  const existing = employeeAvailability[employee].dates[dateStr];
  if (!existing) return;

  delete existing.off;
  const hasAnything = existing.start || existing.end || (existing.blockedTypes && existing.blockedTypes.length);
  if (!hasAnything) {
    delete employeeAvailability[employee].dates[dateStr];
  } else {
    employeeAvailability[employee].dates[dateStr] = existing;

  saveAvailability();
  scheduleCalendarRender();
  renderOffList();
}

}

}

function setTimePickerValue(timeValue = '07:00') {
  const [hRaw, mRaw] = (timeValue || '07:00').split(':');
  const hour = String(Number(hRaw || '7')).padStart(2, '0');
  const minute = String(Number(mRaw || '0')).padStart(2, '0');

  document.getElementById('f-time-hour').value = hour;

  // Hardcoded minute options per requirement: [0, 15, 30, 45]
  const allowedMinutes = ['00', '15', '30', '45'];
  document.getElementById('f-time-minute').value = allowedMinutes.includes(minute) ? minute : '00';
  syncTimePickerValue();
}

function initTimePicker() {
  const hourSelect = document.getElementById('f-time-hour');
  const minuteSelect = document.getElementById('f-time-minute');

  hourSelect.innerHTML = '';
  for (let h = 0; h < 24; h++) {
    const hh = String(h).padStart(2, '0');
    const option = document.createElement('option');
    option.value = hh;
    option.textContent = hh;
    hourSelect.appendChild(option);
  }

  minuteSelect.innerHTML = '';
  [0, 15, 30, 45].forEach(min => {
    const mm = String(min).padStart(2, '0');
    const option = document.createElement('option');
    option.value = mm;
    option.textContent = mm;
    minuteSelect.appendChild(option);
  });

  setTimePickerValue('07:00');
}

function scheduleCalendarRender(mode = 'defer') {
  const nextMode = mode === 'debounce' ? 'debounce' : 'defer';
  const nextDelay = nextMode === 'debounce' ? 120 : 16;

  if (renderTimer && pendingRenderMode === 'debounce' && nextMode === 'defer') {
    clearTimeout(renderTimer);
    renderTimer = null;
  }

  if (renderTimer && pendingRenderMode === nextMode) {
    clearTimeout(renderTimer);
  }

  pendingRenderMode = nextMode;
  renderTimer = window.setTimeout(() => {
    renderTimer = null;
    pendingRenderMode = 'defer';
    renderCalendar();
  }, nextDelay);
}

function saveAvailability() {
  localStorage.setItem(AVAILABILITY_KEY, JSON.stringify(employeeAvailability));
}

function saveAudit() {
  localStorage.setItem(AUDIT_KEY, JSON.stringify(activityAudit));
}

function cloneDefaultAvailability() {
  return JSON.parse(JSON.stringify(DEFAULT_EMPLOYEE_AVAILABILITY));
}

function normalizeAvailabilityShape(raw) {
  const base = cloneDefaultAvailability();
  Object.keys(EMPLOYEES).forEach(name => {
    if (!base[name]) base[name] = { weekly: {}, dates: {} };
    if (!base[name].weekly) base[name].weekly = {};
    if (!base[name].dates) base[name].dates = {};
  });

  if (!raw || typeof raw !== 'object') return base;

  Object.keys(raw).forEach(name => {
    if (!base[name]) base[name] = { weekly: {}, dates: {} };
    base[name].weekly = raw[name]?.weekly || base[name].weekly || {};
    base[name].dates = raw[name]?.dates || base[name].dates || {};
  });

  return base;
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { activities = JSON.parse(raw); return; }
  } catch(e) {}
  activities = getSeedData();
  saveData();
}

function loadAvailability() {
  try {
    const raw = localStorage.getItem(AVAILABILITY_KEY);
    if (raw) {
      employeeAvailability = normalizeAvailabilityShape(JSON.parse(raw));
      return;
    }
  } catch(e) {}

  employeeAvailability = cloneDefaultAvailability();
  saveAvailability();
}

function loadAudit() {
  try {
    const raw = localStorage.getItem(AUDIT_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      activityAudit = Array.isArray(parsed) ? parsed : [];
      return;
    }
  } catch(e) {}
  activityAudit = [];
  saveAudit();
}

function getCurrentUserEmail() {
  return currentUser?.email || 'desconocido';
}

function isEditor() {
  return Boolean(currentUser?.editor);
}

function updateAuthUI() {
  const userPill = document.getElementById('user-pill');
  const editorBadge = isEditor() ? 'Editor' : 'Staff';
  userPill.textContent = `${editorBadge} · ${getCurrentUserEmail()}`;
  document.getElementById('btn-availability').style.display = isEditor() ? 'inline-flex' : 'none';
}

function formatActivityForLog(act) {
  const typeName = getTypeNameById(act.type || 'other');
  return `${typeName}${act.client ? ` · ${act.client}` : ''}${act.time ? ` (${act.time})` : ''}`;
}

function logAudit(action, activity, detail = '') {
  const record = {
    id: Date.now() + Math.random(),
    at: new Date().toISOString(),
    action,
    user: getCurrentUserEmail(),
    detail: detail || formatActivityForLog(activity || {}),
  };
  activityAudit.unshift(record);
  if (activityAudit.length > 400) activityAudit = activityAudit.slice(0, 400);
  saveAudit();
}

function fmtAuditDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString('es-CR', { hour12: false });
  } catch (_) {
    return iso || '';
  }
}

// ── LOGIN ───────────────────────────────────────────────
function tryLogin() {
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  const pin = document.getElementById('pwd-input').value.trim();
  const looksLikeEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

  if (looksLikeEmail && pin === PASSWORD) {
    currentUser = {
      email,
      editor: EDITOR_EMAILS.includes(email),
    };

    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');

    loadData();
    loadAvailability();
    loadAudit();
    updateAuthUI();
    scheduleCalendarRender();
  } else {
    document.getElementById('login-error').classList.add('show');
    document.getElementById('pwd-input').value = '';
  }
}
function logout() {
  currentUser = null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('email-input').value = '';
  document.getElementById('pwd-input').value = '';
  document.getElementById('login-error').classList.remove('show');
}

document.getElementById('email-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});

// ── WEEK UTILS ──────────────────────────────────────────
function getWeekStart(offset = 0) {
  const d = new Date();
  d.setHours(0,0,0,0);
  const day = d.getDay(); // 0=Sun
  d.setDate(d.getDate() - day + offset * 7);
  return d;
}

function formatWeekLabel(start) {
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  if (start.getMonth() === end.getMonth()) {
    return `${start.getDate()} – ${end.getDate()} ${months[start.getMonth()]} ${start.getFullYear()}`;
  }
  return `${start.getDate()} ${months[start.getMonth()]} – ${end.getDate()} ${months[end.getMonth()]} ${start.getFullYear()}`;
}

function changeWeek(delta) { weekOffset += delta; scheduleCalendarRender(); }
function goToday() { weekOffset = 0; scheduleCalendarRender(); }

function openQuickAddModal() {
  const weekStart = getWeekStart(weekOffset);
  const today = new Date();
  today.setHours(0,0,0,0);

  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);

  let dayIndex = 0;
  if (today >= weekStart && today <= weekEnd) {
    dayIndex = today.getDay();
  }

  const date = new Date(weekStart);
  date.setDate(date.getDate() + dayIndex);
  const dateStr = date.toISOString().split('T')[0];
  const defaultSlot = TIME_SLOTS[0]?.id || 'morning';

  openModal(null, dayIndex, defaultSlot, dateStr);
}

// ── RENDER CALENDAR ─────────────────────────────────────
function renderCalendar() {
  const weekStart = getWeekStart(weekOffset);
  document.getElementById('week-label').textContent = formatWeekLabel(weekStart);

  const grid = document.getElementById('calendar-grid');
  const fragment = document.createDocumentFragment();

  const today = new Date(); today.setHours(0,0,0,0);
  const activityMap = new Map();

  activities.forEach(activity => {
    const scopeKey = activity.weekly ? `weekly:${activity.dow}` : `date:${activity.date}`;
    const key = `${scopeKey}|${activity.slot}`;
    const bucket = activityMap.get(key);

    if (bucket) {
      bucket.push(activity);
    } else {
      activityMap.set(key, [activity]);
    }
  });

  // Header row
  const timeHeader = document.createElement('div');
  timeHeader.className = 'col-header time-header';
  fragment.appendChild(timeHeader);

  for (let d = 0; d < 7; d++) {
    const date = new Date(weekStart);
    date.setDate(date.getDate() + d);
    const isToday = date.getTime() === today.getTime();
    const div = document.createElement('div');
    div.className = 'col-header' + (isToday ? ' today-col' : '');
    div.innerHTML = `<span class="day-name">${DAYS_SHORT[d]}</span><span class="day-num">${date.getDate()}</span>`;

    fragment.appendChild(div);
  }

  // Time slot rows
  TIME_SLOTS.forEach(slot => {
    const timeLabel = document.createElement('div');
    timeLabel.className = 'time-label';
    timeLabel.innerHTML = `<span>${slot.label}</span>`;
    fragment.appendChild(timeLabel);

    for (let d = 0; d < 7; d++) {
      const date = new Date(weekStart);
      date.setDate(date.getDate() + d);
      const dateStr = date.toISOString().split('T')[0];

      const cell = document.createElement('div');
      cell.className = 'day-cell';

      const weeklyActivities = activityMap.get(`weekly:${d}|${slot.id}`) || [];
      const datedActivities = activityMap.get(`date:${dateStr}|${slot.id}`) || [];

      weeklyActivities.forEach(act => {
        cell.appendChild(makePill(act));
      });

      datedActivities.forEach(act => {
        cell.appendChild(makePill(act));
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'add-btn';
      addBtn.textContent = '+';
      addBtn.title = 'Agregar actividad';
      addBtn.dataset.dayIndex = String(d);
      addBtn.dataset.slotId = slot.id;
      addBtn.dataset.dateStr = dateStr;
      cell.appendChild(addBtn);

      fragment.appendChild(cell);
    }
  });

  grid.replaceChildren(fragment);
}

function makePill(act) {
  const type = ACTIVITY_TYPES.find(t => t.id === act.type) || ACTIVITY_TYPES[8];
  const pill = document.createElement('div');
  pill.className = `activity-pill color-${type.color}`;
  pill.dataset.activityId = String(act.id);

  const staffLine = [act.staff, (act.by || act.supervisor)].filter(Boolean).join(', ');
  pill.innerHTML = `
    <span class="pill-time">${act.time || ''}${act.weekly ? ' 🔁' : ''}<span class="pill-location ${getSectionClass(act.section)}">${getSectionLabel(act.section)}</span></span>
    <span class="pill-name">${type.emoji} ${type.name}${act.client ? ' · ' + act.client : ''}</span>
    ${staffLine ? `<span class="pill-staff">${staffLine}</span>` : ''}
    <button class="pill-del" title="Eliminar" data-activity-id="${act.id}">✕</button>
  `;
  return pill;
}

function quickDelete(id) {
  if (!confirm('¿Eliminar esta actividad?')) return;
  const removed = activities.find(a => a.id === id);
  activities = activities.filter(a => a.id !== id);
  if (removed) logAudit('eliminar', removed);
  saveData();
  scheduleCalendarRender();
}

// ── MODAL ───────────────────────────────────────────────
let selectedType = 'yoga';

function buildTypeGrid() {
  const grid = document.getElementById('type-grid');
  grid.innerHTML = '';
  ACTIVITY_TYPES.forEach(t => {
    const chip = document.createElement('div');
    chip.className = `type-chip color-${t.color}${selectedType === t.id ? ' selected' : ''}`;
    chip.innerHTML = `${t.emoji}<br>${t.name}`;
    chip.dataset.id = t.id;
    chip.onclick = () => {
      selectedType = t.id;
      document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      updateStaffDropdowns(true);
      refreshAssignmentWarning();
    };
    grid.appendChild(chip);
  });
}

function openModal(act, dayIndex, slotId, dateStr) {
  editingId = act ? act.id : null;
  pendingCell = act ? null : { dayIndex, slotId, dateStr };

  document.getElementById('modal-title').textContent = act ? 'Editar actividad' : 'Nueva actividad';
  document.getElementById('btn-delete').style.display = act ? 'block' : 'none';

  selectedType = act ? act.type : 'yoga';
  buildTypeGrid();
  updateStaffDropdowns(false);

  setTimePickerValue(act?.time || '07:00');
  document.getElementById('f-duration').value   = act?.duration   || '60';
  document.getElementById('f-section').value    = act?.section    || 'hotel';
  document.getElementById('f-client').value     = act?.client     || '';
  document.getElementById('f-staff').value      = act?.staff      || '';
  document.getElementById('f-by').value         = act?.by || act?.supervisor || '';
  document.getElementById('f-notes').value      = act?.notes      || '';
  document.getElementById('f-weekly').checked   = act ? !!act.weekly : false;

  refreshAssignmentWarning();

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveActivity() {
  const timeValue = document.getElementById('f-time').value;
  if (!isQuarterHourTime(timeValue)) {
    alert('La hora debe usar intervalos de 15 minutos: 00, 15, 30 o 45.');
    return;
  }

  const act = {
    type:       selectedType,
    time:       timeValue,
    duration:   parseInt(document.getElementById('f-duration').value),
    section:    document.getElementById('f-section').value,
    client:     document.getElementById('f-client').value.trim(),
    staff:      document.getElementById('f-staff').value,
    by:         document.getElementById('f-by').value,
    notes:      document.getElementById('f-notes').value.trim(),
    weekly:     document.getElementById('f-weekly').checked,
  };

  const validationDate = resolveModalDateStr();
  const availabilityCheck = validateAssignmentAvailability(act.staff, validationDate, act.time, act.type);
  if (!availabilityCheck.ok) {
    const proceed = confirm(`Aviso de disponibilidad:\n\n${availabilityCheck.reason}\n\n¿Deseas guardar de todas formas?`);
    if (!proceed) return;
  }

  if (editingId !== null) {
    const idx = activities.findIndex(a => a.id === editingId);
    if (idx > -1) {
      const before = { ...activities[idx] };
      Object.assign(activities[idx], act);
      logAudit('editar', activities[idx], `${formatActivityForLog(before)} → ${formatActivityForLog(activities[idx])}`);
    }
  } else {
    act.id  = Date.now();
    act.dow = pendingCell.dayIndex;
    act.slot = pendingCell.slotId;
    act.date = pendingCell.dateStr;
    activities.push(act);
    logAudit('agregar', act);
  }

  saveData();
  closeModal();
  scheduleCalendarRender();
}

function deleteActivity() {
  if (!confirm('¿Eliminar esta actividad permanentemente?')) return;
  const removed = activities.find(a => a.id === editingId);
  activities = activities.filter(a => a.id !== editingId);
  if (removed) logAudit('eliminar', removed);
  saveData();
  closeModal();
  scheduleCalendarRender();
}

function handleCalendarInteraction(event) {
  const deleteButton = event.target.closest('.pill-del');
  if (deleteButton) {
    event.stopPropagation();
    const activityId = Number(deleteButton.dataset.activityId);
    window.setTimeout(() => quickDelete(activityId), 0);
    return;
  }

  const addButton = event.target.closest('.add-btn');
  if (addButton) {
    event.stopPropagation();
    const dayIndex = Number(addButton.dataset.dayIndex);
    const slotId = addButton.dataset.slotId;
    const dateStr = addButton.dataset.dateStr;
    window.setTimeout(() => openModal(null, dayIndex, slotId, dateStr), 0);
    return;
  }

  const pill = event.target.closest('.activity-pill');
  if (pill) {
    const activityId = Number(pill.dataset.activityId);
    const activity = activities.find(item => item.id === activityId);
    if (!activity) return;
    window.setTimeout(() => openModal(activity), 0);
  }
}
