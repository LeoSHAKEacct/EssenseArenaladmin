<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essense Arenal — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a2e1a;
    --moss: #3d5c2e;
    --sage: #7a9e6b;
    --mist: #b8cfa8;
    --cream: #f5f0e8;
    --parchment: #ede5d4;
    --warm-white: #faf8f4;
    --clay: #c4956a;
    --terra: #8b5e3c;
    --charcoal: #2c2c2c;
    --mid: #6b7569;
    --light: #a8b5a0;
    --border: #ddd8cc;

    --hotel-color: #4a7c59;
    --finca-color: #8b5e3c;

    --yoga: #7a9e6b;
    --massage: #c4956a;
    --cacao: #8b5e3c;
    --bird: #4a7c8c;
    --night: #3d3d6e;
    --meditation: #9b8ea8;
    --kayak: #4a8c8c;
    --cooking: #b8834a;
    --other: #6b7569;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--warm-white);
    color: var(--charcoal);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOGIN ─────────────────────────────────────────── */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--forest);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    flex-direction: column;
    gap: 0;
  }
  #login-screen.hidden { display: none; }

  .login-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, #2d4a1e 0%, #1a2e1a 60%);
    overflow: hidden;
  }
  .login-bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233d5c2e' fill-opacity='0.15'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.6;
  }

  .login-box {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    gap: 32px;
    animation: fadeUp 0.8s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    text-align: center;
  }
  .login-logo h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    color: var(--mist);
    letter-spacing: 0.08em;
    line-height: 1;
  }
  .login-logo p {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--sage);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .login-form {
    display: flex; flex-direction: column; gap: 14px; align-items: center; width: 240px;
  }
  .login-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--light);
    text-transform: uppercase;
    align-self: flex-start;
  }
  .login-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(184,207,168,0.25);
    border-radius: 4px;
    padding: 12px 16px;
    color: var(--mist);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.3em;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .login-input:focus {
    border-color: rgba(184,207,168,0.6);
    background: rgba(255,255,255,0.1);
  }
  .login-btn {
    width: 100%;
    background: var(--sage);
    color: var(--forest);
    border: none;
    border-radius: 4px;
    padding: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .login-btn:hover { background: var(--mist); }
  .login-btn:active { transform: scale(0.98); }
  .login-error {
    font-size: 12px; color: #e07070; display: none;
    font-family: 'DM Mono', monospace; letter-spacing: 0.05em;
  }
  .login-error.show { display: block; }

  /* ── APP SHELL ─────────────────────────────────────── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }
  #app.hidden { display: none; }

  header {
    background: var(--forest);
    padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .header-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--mist);
    letter-spacing: 0.06em;
    display: flex; align-items: baseline; gap: 10px;
  }
  .header-logo span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--sage);
    text-transform: uppercase;
  }

  .header-actions {
    display: flex; align-items: center; gap: 10px;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(184,207,168,0.25);
    color: var(--light);
    border-radius: 4px;
    padding: 6px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--sage); color: var(--mist); }

  /* ── NAV TABS ──────────────────────────────────────── */
  .tab-bar {
    background: var(--parchment);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: stretch;
    padding: 0 28px;
    gap: 0;
  }
  .tab {
    padding: 14px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    position: relative; top: 1px;
    white-space: nowrap;
  }
  .tab:hover { color: var(--charcoal); }
  .tab.active {
    color: var(--forest);
    border-bottom-color: var(--moss);
    font-weight: 400;
  }
  .tab-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; margin-right: 7px;
    vertical-align: middle; position: relative; top: -1px;
  }

  /* ── WEEK NAV ──────────────────────────────────────── */
  .week-nav {
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 28px;
  }
  .week-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--forest);
    letter-spacing: 0.04em;
  }
  .week-btns { display: flex; gap: 6px; align-items: center; }
  .nav-btn {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 15px; color: var(--mid);
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--sage); color: var(--forest); }
  .btn-today {
    background: var(--forest);
    border: none;
    border-radius: 4px;
    padding: 0 14px; height: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mist);
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-today:hover { background: var(--moss); }

  /* ── CALENDAR GRID ─────────────────────────────────── */
  .calendar-wrapper {
    flex: 1;
    padding: 24px 28px;
    overflow-x: auto;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: 80px repeat(7, 1fr);
    min-width: 760px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: white;
    box-shadow: 0 2px 16px rgba(26,46,26,0.06);
  }

  .col-header {
    background: var(--forest);
    color: var(--mist);
    padding: 12px 8px;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .col-header:last-child { border-right: none; }
  .col-header.time-header { background: var(--forest); }
  .col-header .day-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--sage);
    display: block;
  }
  .col-header .day-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: var(--mist);
    display: block;
    line-height: 1.1;
  }
  .col-header.today-col .day-num {
    color: var(--clay);
  }

  .time-slot-row {
    display: contents;
  }
  .time-label {
    background: var(--parchment);
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 10px 6px 10px 10px;
    display: flex; align-items: flex-start;
  }
  .time-label span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--mid);
    white-space: nowrap;
  }

  .day-cell {
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 6px;
    min-height: 90px;
    position: relative;
    transition: background 0.15s;
  }
  .day-cell:last-child { border-right: none; }
  .day-cell:hover { background: rgba(122,158,107,0.04); }

  .add-btn {
    position: absolute; bottom: 5px; right: 5px;
    width: 22px; height: 22px;
    background: var(--mist);
    border: none;
    border-radius: 50%;
    color: var(--forest);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .day-cell:hover .add-btn { opacity: 1; }
  .add-btn:hover { background: var(--sage); color: white; }

  /* ── ACTIVITY PILLS ────────────────────────────────── */
  .activity-pill {
    border-radius: 4px;
    padding: 4px 7px;
    margin-bottom: 4px;
    font-size: 11px;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s, box-shadow 0.1s;
    border-left: 3px solid rgba(0,0,0,0.2);
  }
  .activity-pill:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .activity-pill .pill-time {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    opacity: 0.75;
    letter-spacing: 0.05em;
  }
  .activity-pill .pill-name {
    font-weight: 500;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .activity-pill .pill-staff {
    font-size: 9px;
    opacity: 0.7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pill-del {
    position: absolute; top: 3px; right: 3px;
    width: 14px; height: 14px;
    background: rgba(0,0,0,0.2);
    border: none; border-radius: 50%;
    color: white; font-size: 9px;
    cursor: pointer; opacity: 0;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: opacity 0.15s;
  }
  .activity-pill:hover .pill-del { opacity: 1; }
  .pill-del:hover { background: rgba(180,40,40,0.6); }

  /* activity colors */
  .color-yoga    { background: #e8f5e2; color: #2d5a1e; }
  .color-massage { background: #fdf0e4; color: #6b3a10; }
  .color-cacao   { background: #f0e8dc; color: #5a3010; }
  .color-bird    { background: #e0f0f5; color: #0d4a5a; }
  .color-night   { background: #e8e8f5; color: #2a2a5a; }
  .color-meditation { background: #f0ecf8; color: #4a3060; }
  .color-kayak   { background: #e0f5f5; color: #0d4a4a; }
  .color-cooking { background: #fdf5e4; color: #6b4010; }
  .color-other   { background: #f0f0ee; color: #3a3a38; }

  /* ── MODAL ─────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,46,26,0.55);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open {
    opacity: 1; pointer-events: all;
  }
  .modal {
    background: var(--warm-white);
    border-radius: 10px;
    width: 100%; max-width: 460px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.2);
    overflow: hidden;
    transform: translateY(16px);
    transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    background: var(--forest);
    padding: 18px 22px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--mist);
    letter-spacing: 0.04em;
  }
  .modal-close {
    background: none; border: none;
    color: var(--light); font-size: 20px;
    cursor: pointer; line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--mist); }

  .modal-body {
    padding: 22px;
    display: flex; flex-direction: column; gap: 14px;
    max-height: 70vh; overflow-y: auto;
  }

  .form-row { display: flex; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .form-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid);
  }
  .form-input, .form-select {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    color: var(--charcoal);
    background: white;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-input:focus, .form-select:focus {
    border-color: var(--sage);
  }

  /* activity type picker */
  .type-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .type-chip {
    padding: 8px 6px;
    border-radius: 5px;
    border: 2px solid transparent;
    cursor: pointer;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.15s;
    line-height: 1.3;
  }
  .type-chip:hover { transform: translateY(-1px); }
  .type-chip.selected { border-color: var(--forest) !important; box-shadow: 0 0 0 2px rgba(26,46,26,0.2); }

  .modal-footer {
    padding: 14px 22px;
    display: flex; gap: 8px; justify-content: flex-end;
    border-top: 1px solid var(--border);
    background: var(--cream);
  }
  .btn-cancel {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; color: var(--mid);
    cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--mid); color: var(--charcoal); }
  .btn-save {
    background: var(--forest);
    border: none;
    border-radius: 4px;
    padding: 9px 22px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; color: var(--mist);
    cursor: pointer; font-weight: 500;
    transition: background 0.15s;
  }
  .btn-save:hover { background: var(--moss); }
  .btn-delete-act {
    background: #c0392b;
    border: none;
    border-radius: 4px;
    padding: 9px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; color: white;
    cursor: pointer;
    transition: background 0.15s;
    margin-right: auto;
  }
  .btn-delete-act:hover { background: #a93226; }

  /* ── RESPONSIVE ──────────────────────────────── */
  @media (max-width: 600px) {
    .calendar-wrapper { padding: 12px; }
    header { padding: 0 14px; }
    .tab-bar, .week-nav { padding: 0 14px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-bg"></div>
  <div class="login-box">
    <div class="login-logo">
      <h1>Essense Arenal</h1>
      <p>Panel de Administración</p>
    </div>
    <div class="login-form">
      <label class="login-label">Código de acceso</label>
      <input class="login-input" type="password" id="pwd-input" maxlength="6" placeholder="···" autocomplete="off">
      <button class="login-btn" onclick="tryLogin()">Ingresar</button>
      <div class="login-error" id="login-error">Código incorrecto</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <div class="header-logo">
      Essense Arenal <span>Admin</span>
    </div>
    <div class="header-actions">
      <button class="btn-ghost" onclick="logout()">Salir</button>
    </div>
  </header>

  <div class="tab-bar">
    <div class="tab active" data-section="hotel" onclick="switchSection('hotel')">
      <span class="tab-dot" style="background:var(--hotel-color)"></span>Hotel
    </div>
    <div class="tab" data-section="finca" onclick="switchSection('finca')">
      <span class="tab-dot" style="background:var(--finca-color)"></span>Finca
    </div>
  </div>

  <div class="week-nav">
    <div class="week-label" id="week-label"></div>
    <div class="week-btns">
      <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
      <button class="btn-today" onclick="goToday()">Hoy</button>
      <button class="nav-btn" onclick="changeWeek(1)">›</button>
    </div>
  </div>

  <div class="calendar-wrapper">
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>
</div>

<!-- ACTIVITY MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nueva actividad</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <div class="form-label">Tipo de actividad</div>
        <div class="type-grid" id="type-grid"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Hora inicio</label>
          <input class="form-input" type="time" id="f-time" value="07:00">
        </div>
        <div class="form-group">
          <label class="form-label">Duración</label>
          <select class="form-select" id="f-duration">
            <option value="60">1 hora</option>
            <option value="90">1.5 horas</option>
            <option value="120">2 horas</option>
            <option value="180">3 horas</option>
            <option value="240">4 horas</option>
            <option value="30">30 min</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Cliente / grupo</label>
        <input class="form-input" type="text" id="f-client" placeholder="Nombre del cliente o grupo">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Guía / Terapeuta</label>
          <select class="form-select" id="f-staff">
            <option value="">— sin asignar —</option>
            <option>Daniela</option>
            <option>Carlos</option>
            <option>Mariela</option>
            <option>Andrés</option>
            <option>Sofia</option>
            <option>Luis</option>
            <option>Valentina</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Supervisor</label>
          <select class="form-select" id="f-supervisor">
            <option value="">— ninguno —</option>
            <option>Daniela</option>
            <option>Carlos</option>
            <option>Mariela</option>
            <option>Andrés</option>
            <option>Sofia</option>
            <option>Luis</option>
            <option>Valentina</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notas</label>
        <input class="form-input" type="text" id="f-notes" placeholder="Observaciones opcionales">
      </div>
      <div class="form-group">
        <label class="form-label">
          <input type="checkbox" id="f-weekly" style="margin-right:6px;">
          Repetir cada semana (actividad fija)
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete-act" id="btn-delete" style="display:none" onclick="deleteActivity()">Eliminar</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveActivity()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const PASSWORD = '777';
const STORAGE_KEY = 'essense_arenal_v2';
const DAYS_ES = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const DAYS_SHORT = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

const TIME_SLOTS = [
  { id: 'morning',   label: '7–9 am',    hour: 7 },
  { id: 'midday',    label: '10–12 pm',  hour: 10 },
  { id: 'afternoon', label: '2–5 pm',    hour: 14 },
  { id: 'evening',   label: '5–8 pm',    hour: 17 },
];

const ACTIVITY_TYPES = [
  { id: 'yoga',        name: 'Yoga',          color: 'yoga',      emoji: '🧘' },
  { id: 'massage',     name: 'Masaje',        color: 'massage',   emoji: '💆' },
  { id: 'cacao',       name: 'Tour Cacao',    color: 'cacao',     emoji: '🍫' },
  { id: 'bird',        name: 'Bird Watching', color: 'bird',      emoji: '🦜' },
  { id: 'night',       name: 'Tour Nocturno', color: 'night',     emoji: '🌙' },
  { id: 'meditation',  name: 'Meditación',    color: 'meditation',emoji: '✨' },
  { id: 'kayak',       name: 'Kayak',         color: 'kayak',     emoji: '🛶' },
  { id: 'cooking',     name: 'Cocina',        color: 'cooking',   emoji: '🍃' },
  { id: 'other',       name: 'Otro',          color: 'other',     emoji: '📋' },
];

// ── STATE ───────────────────────────────────────────────
let currentSection = 'hotel';
let weekOffset = 0;
let activities = [];
let editingId = null;
let pendingCell = null; // { dayIndex, slotId }

// ── PERSISTENCE ─────────────────────────────────────────
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(activities));
}
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { activities = JSON.parse(raw); return; }
  } catch(e) {}
  activities = getSeedData();
  saveData();
}

  };

  // Hotel activities
  add('hotel',1,'morning','yoga','07:00','Grupo Hotel','Daniela');
  add('hotel',3,'morning','yoga','07:00','Grupo Hotel','Daniela');
  add('hotel',5,'morning','yoga','07:00','Grupo Hotel','Daniela');
  add('hotel',1,'midday','massage','10:00','Reserva privada','Sofia');
  add('hotel',2,'midday','massage','10:00','Reserva privada','Sofia');
  add('hotel',4,'midday','massage','11:00','Reserva privada','Sofia');
  add('hotel',2,'afternoon','meditation','14:00','Grupo Retiro','Daniela');
  add('hotel',4,'afternoon','meditation','14:00','Grupo Retiro','Daniela');
  add('hotel',1,'evening','cacao','17:00','Tour Cacao','Carlos');
  add('hotel',3,'evening','cacao','17:00','Tour Cacao','Carlos');

  // Finca activities

// ── LOGIN ───────────────────────────────────────────────
function tryLogin() {
  const v = document.getElementById('pwd-input').value.trim();
  if (v === PASSWORD) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadData();
    renderCalendar();
  } else {
    document.getElementById('login-error').classList.add('show');
    document.getElementById('pwd-input').value = '';
  }
}
function logout() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('pwd-input').value = '';
  document.getElementById('login-error').classList.remove('show');
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});

// ── WEEK UTILS ──────────────────────────────────────────
function getWeekStart(offset = 0) {
  const d = new Date();
  d.setHours(0,0,0,0);
  const day = d.getDay(); // 0=Sun
  d.setDate(d.getDate() - day + offset * 7);
  return d;
}

function formatWeekLabel(start) {
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  if (start.getMonth() === end.getMonth()) {
    return `${start.getDate()} – ${end.getDate()} ${months[start.getMonth()]} ${start.getFullYear()}`;
  }
  return `${start.getDate()} ${months[start.getMonth()]} – ${end.getDate()} ${months[end.getMonth()]} ${start.getFullYear()}`;
}

function changeWeek(delta) { weekOffset += delta; renderCalendar(); }
function goToday() { weekOffset = 0; renderCalendar(); }
function switchSection(s) {
  currentSection = s;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.section === s));
  renderCalendar();
}

// ── RENDER CALENDAR ─────────────────────────────────────
function renderCalendar() {
  const weekStart = getWeekStart(weekOffset);
  document.getElementById('week-label').textContent = formatWeekLabel(weekStart);

  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';

  const today = new Date(); today.setHours(0,0,0,0);

  // Header row
  const timeHeader = document.createElement('div');
  timeHeader.className = 'col-header time-header';
  grid.appendChild(timeHeader);

  for (let d = 0; d < 7; d++) {
    const date = new Date(weekStart);
    date.setDate(date.getDate() + d);
    const isToday = date.getTime() === today.getTime();
    const div = document.createElement('div');
    div.className = 'col-header' + (isToday ? ' today-col' : '');
    div.innerHTML = `<span class="day-name">${DAYS_SHORT[d]}</span><span class="day-num">${date.getDate()}</span>`;
    grid.appendChild(div);
  }

  // Time slot rows
  TIME_SLOTS.forEach(slot => {
    const timeLabel = document.createElement('div');
    timeLabel.className = 'time-label';
    timeLabel.innerHTML = `<span>${slot.label}</span>`;
    grid.appendChild(timeLabel);

    for (let d = 0; d < 7; d++) {
      const date = new Date(weekStart);
      date.setDate(date.getDate() + d);
      const dateStr = date.toISOString().split('T')[0];

      const cell = document.createElement('div');
      cell.className = 'day-cell';

      // Get activities for this cell
      const cellActivities = activities.filter(a => {
        if (a.section !== currentSection) return false;
        if (a.slot !== slot.id) return false;
        if (a.weekly) return a.dow === d;
        return a.date === dateStr;
      });

      cellActivities.forEach(act => {
        cell.appendChild(makePill(act));
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'add-btn';
      addBtn.textContent = '+';
      addBtn.title = 'Agregar actividad';
      addBtn.onclick = (e) => { e.stopPropagation(); openModal(null, d, slot.id, dateStr); };
      cell.appendChild(addBtn);

      grid.appendChild(cell);
    }
  });
}

function makePill(act) {
  const type = ACTIVITY_TYPES.find(t => t.id === act.type) || ACTIVITY_TYPES[8];
  const pill = document.createElement('div');
  pill.className = `activity-pill color-${type.color}`;

  const staffLine = [act.staff, act.supervisor].filter(Boolean).join(', ');
  pill.innerHTML = `
    <span class="pill-time">${act.time || ''}${act.weekly ? ' 🔁' : ''}</span>
    <span class="pill-name">${type.emoji} ${type.name}${act.client ? ' · ' + act.client : ''}</span>
    ${staffLine ? `<span class="pill-staff">${staffLine}</span>` : ''}
    <button class="pill-del" title="Eliminar" onclick="quickDelete(event, ${act.id})">✕</button>
  `;
  pill.addEventListener('click', () => openModal(act));
  return pill;
}

function quickDelete(e, id) {
  e.stopPropagation();
  if (!confirm('¿Eliminar esta actividad?')) return;
  activities = activities.filter(a => a.id !== id);
  saveData(); renderCalendar();
}

// ── MODAL ───────────────────────────────────────────────
let selectedType = 'yoga';

function buildTypeGrid() {
  const grid = document.getElementById('type-grid');
  grid.innerHTML = '';
  ACTIVITY_TYPES.forEach(t => {
    const chip = document.createElement('div');
    chip.className = `type-chip color-${t.color}${selectedType === t.id ? ' selected' : ''}`;
    chip.innerHTML = `${t.emoji}<br>${t.name}`;
    chip.dataset.id = t.id;
    chip.onclick = () => {
      selectedType = t.id;
      document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
    };
    grid.appendChild(chip);
  });
}

function openModal(act, dayIndex, slotId, dateStr) {
  editingId = act ? act.id : null;
  pendingCell = act ? null : { dayIndex, slotId, dateStr };

  document.getElementById('modal-title').textContent = act ? 'Editar actividad' : 'Nueva actividad';
  document.getElementById('btn-delete').style.display = act ? 'block' : 'none';

  selectedType = act ? act.type : 'yoga';
  buildTypeGrid();

  document.getElementById('f-time').value       = act?.time       || '07:00';
  document.getElementById('f-duration').value   = act?.duration   || '60';
  document.getElementById('f-client').value     = act?.client     || '';
  document.getElementById('f-staff').value      = act?.staff      || '';
  document.getElementById('f-supervisor').value = act?.supervisor || '';
  document.getElementById('f-notes').value      = act?.notes      || '';
  document.getElementById('f-weekly').checked   = act ? !!act.weekly : true;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveActivity() {
  const act = {
    type:       selectedType,
    time:       document.getElementById('f-time').value,
    duration:   parseInt(document.getElementById('f-duration').value),
    client:     document.getElementById('f-client').value.trim(),
    staff:      document.getElementById('f-staff').value,
    supervisor: document.getElementById('f-supervisor').value,
    notes:      document.getElementById('f-notes').value.trim(),
    weekly:     document.getElementById('f-weekly').checked,
    section:    currentSection,
  };

  if (editingId !== null) {
    const idx = activities.findIndex(a => a.id === editingId);
    if (idx > -1) {
      Object.assign(activities[idx], act);
    }
  } else {
    act.id  = Date.now();
    act.dow = pendingCell.dayIndex;
    act.slot = pendingCell.slotId;
    act.date = pendingCell.dateStr;
    activities.push(act);
  }

  saveData(); closeModal(); renderCalendar();
}

function deleteActivity() {
  if (!confirm('¿Eliminar esta actividad permanentemente?')) return;
  activities = activities.filter(a => a.id !== editingId);
  saveData(); closeModal(); renderCalendar();
}

// ── INIT ────────────────────────────────────────────────
// focus pwd on load
window.addEventListener('load', () => {
  document.getElementById('pwd-input').focus();
});
</script>
